name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip esp32.zip

      - name: Show folders
        run: ls -la && ls -la esp32_hub || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Get packages
        run: flutter pub get
        working-directory: ${{ github.workspace }}/esp32_hub

      - name: Build APK
        run: flutter build apk --debug
        working-directory: ${{ github.workspace }}/esp32_hub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-Monitor-APK
          path: ${{ github.workspace }}/esp32_hub/build/app/outputs/flutter-apk/app-debug.apk
