name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
      - run: cd esp32_hub && flutter pub get
      - run: cd esp32_hub && flutter build apk --debug
      - uses: actions/upload-artifact@v3
        with:
          name: ESP32-Monitor-APK
          path: esp32_hub/build/app/outputs/flutter-apk/app-debug.apk
